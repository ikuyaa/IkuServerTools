name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Read mod version
        id: version
        run: |
          MOD_VERSION=$(grep '^mod_version=' gradle.properties | cut -d= -f2)
          echo "mod_version=$MOD_VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate release tag
        if: github.event_name == 'push'
        run: |
          EXPECTED_TAG="v${{ steps.version.outputs.mod_version }}"
          if [ "${GITHUB_REF_NAME}" != "$EXPECTED_TAG" ]; then
            echo "Expected tag $EXPECTED_TAG, got ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Build with Gradle
        run: ./gradlew build

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v${{ steps.version.outputs.mod_version }}"
          gh release create "$TAG_NAME" build/libs/*.jar \
            --title "$TAG_NAME" \
            --notes "Release $TAG_NAME"
